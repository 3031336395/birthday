<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谢皓祥 · 生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 飘落粒子 */
        .particle {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.8;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        /* 蛋糕图标 */
        .cake {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 主标题 */
        h1 {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(255, 107, 107, 0.3);
            margin-bottom: 15px;
            letter-spacing: 4px;
            animation: fadeInUp 1s ease-out;
        }

        .name {
            font-size: 4.5rem;
            background: linear-gradient(90deg, #fff, #ffeaa7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite, fadeInUp 1s ease-out 0.2s both;
            margin-bottom: 10px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 40px;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        /* 祝福卡片 */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px 40px;
            max-width: 500px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.15);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .wish {
            font-size: 1.1rem;
            color: #fff;
            line-height: 2;
            letter-spacing: 1px;
        }

        .wish p {
            margin-bottom: 12px;
        }

        .wish p:last-child {
            margin-bottom: 0;
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            top: 35px;
            right: 85px;
            color: #fff;
            font-size: 0.9rem;
            opacity: 0.8;
            z-index: 100;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; }
        }

        /* 底部装饰 */
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .name {
                font-size: 2.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .card {
                padding: 25px;
            }
            .wish {
                font-size: 1rem;
                line-height: 1.8;
            }
            .cake {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- 音乐控制 -->
    <div class="hint" id="hint">点击播放音乐 ♪</div>
    <button class="music-btn" id="musicBtn">🎵</button>
    
    <!-- 背景音乐：把mp3文件和网页放在同一文件夹，命名为 qifengle.mp3 即可自动播放 -->
    <audio id="bgMusic" loop>
        <source src="qifengle.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="cake">🎂</div>
        <h1>生日快乐</h1>
        <div class="name">谢皓祥</div>
        <p class="subtitle">Happy Birthday To You</p>

        <div class="card">
            <div class="wish">
                <p>愿你岁岁常欢愉，年年皆胜意</p>
                <p>愿所有的美好和温暖</p>
                <p>都在这个特别的日子里如约而至</p>
                <p>愿你前程似锦，未来可期</p>
                <p>愿你被世界温柔以待</p>
            </div>
        </div>

        <div class="footer">
            ✨ 愿你每一岁都奔走在自己的热爱里 ✨
        </div>
    </div>

    <script>
        // 生成飘落粒子
        const particles = ['🎈', '🎊', '⭐', '✨', '🌸', '💫', '🎉'];
        const particleCount = 25;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = particles[Math.floor(Math.random() * particles.length)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 5 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 8) + 's';
            particle.style.fontSize = (Math.random() * 15 + 15) + 'px';
            document.body.appendChild(particle);
        }

        // 音乐控制
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        const hint = document.getElementById('hint');
        let isPlaying = false;

        musicBtn.addEventListener('click', function() {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                hint.textContent = '点击播放音乐 ♪';
                hint.style.display = 'block';
            } else {
                bgMusic.play().catch(e => {
                    console.log('自动播放被拦截，请手动点击');
                });
                musicBtn.classList.add('playing');
                hint.style.display = 'none';
            }
            isPlaying = !isPlaying;
        });

        // 尝试自动播放（大部分浏览器会拦截）
        window.addEventListener('load', function() {
            bgMusic.volume = 0.5;
            bgMusic.play().then(() => {
                isPlaying = true;
                musicBtn.classList.add('playing');
                hint.style.display = 'none';
            }).catch(() => {
                // 自动播放被拦截，等待用户点击
            });
        });

        // 点击页面任意位置也能触发音乐
        document.body.addEventListener('click', function initAudio() {
            if (!isPlaying) {
                bgMusic.play().then(() => {
                    isPlaying = true;
                    musicBtn.classList.add('playing');
                    hint.style.display = 'none';
                }).catch(() => {});
            }
        }, { once: true });
    </script>
</body>
</html>
